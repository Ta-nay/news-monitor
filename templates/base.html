<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News App</title>



    <!-- Bootswatch theme -->
    <link rel="stylesheet" href="https://bootswatch.com/5/lux/bootstrap.min.css">
    <!-- Bootstrap JS (required for dropdown & mobile toggle) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-light" data-bs-theme="light">
  <div class="container-fluid">

    <a class="navbar-brand" href="/">News Monitor</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarColor03">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarColor03">

      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link active" href="/stories/">Stories</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/sources/">Sources</a>
        </li>

      </ul>

      <!-- RIGHT SIDE AUTH BUTTONS -->
      <ul class="navbar-nav">

        {% if user.is_authenticated %}

        <li class="nav-item">
          <span class="nav-link">Hello {{ user.username }}</span>
        </li>

        <li class="nav-item">
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger">Logout</button>
          </form>
        </li>

        {% else %}

        <li class="nav-item">
          <a class="btn btn-primary me-2" href="{% url 'signin' %}">Login</a>
        </li>

        <li class="nav-item">
          <a class="btn btn-success" href="{% url 'signup' %}">Signup</a>
        </li>

        {% endif %}

      </ul>

    </div>
  </div>
</nav>


<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>
</html>
