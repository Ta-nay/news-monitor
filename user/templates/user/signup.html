{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}

<br><br>
<div class="container">
    <br/>
    <h1>Create Account</h1>
    <br/>
    <form method="POST">
            {% csrf_token %}
            {{ form | crispy }}
        <br/>
    <button type="submit">Signup</button>

    </form>

    <p>
    Already have an account?
    <a href="{% url 'signin' %}">Login</a>
    </p>
</div>

{% endblock %}
